# Automatically label PRs based on changed files

'frontend':
  - frontend-vite/**/*

'backend':
  - backend/**/*

'documentation':
  - '**/*.md'
  - docs/**/*

'dependencies':
  - '**/package.json'
  - '**/package-lock.json'

'configuration':
  - '**/*.config.{js,ts,cjs,mjs}'
  - '**/.*.{js,json,yml,yaml}'
  - '.github/**/*'

'accessibility':
  - '**/*a11y*'
  - '**/*.a11y.{ts,tsx,js,jsx}'

'components':
  - '**/components/**/*'

'tests':
  - '**/*.test.{ts,tsx,js,jsx}'
  - '**/*.spec.{ts,tsx,js,jsx}'
  - '**/tests/**/*'
  - '**/test/**/*'

